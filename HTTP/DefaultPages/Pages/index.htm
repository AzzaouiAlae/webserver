<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function setTheme(theme) {
            document.cookie = 'theme=' + theme + '; path=/';
            document.body.className = theme;
            const xhr = new XMLHttpRequest();
            xhr.open('GET', '/', true);
            xhr.withCredentials = true;
            xhr.send();
        }

        function switchTheme() {
            const currentTheme = document.cookie.split('; ').find(row => row.startsWith('theme=')).split('=')[1];
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            setTheme(newTheme);
        }

        window.onload = function () {
            const themeCookie = document.cookie.split('; ').find(row => row.startsWith('theme='));
            if (themeCookie) {
                const theme = themeCookie.split('=')[1];
                setTheme(theme);
            } else {
                setTheme('light');
            }
        };
    </script>
    <style>
        body.light { background-color: white; color: black; }
        body.dark { background-color: black; color: white; }
    </style>
</head>
<body>
    <nav>
        <button onclick="switchTheme()">Toggle Theme</button>
    </nav>
</body>
</html>
