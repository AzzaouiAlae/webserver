<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 — Forbidden</title>
    <style>
        :root { --primary: #6366f1; --accent: #06b6d4; --accent2: #8b5cf6; --bg: #030712; --text: #f1f5f9; --text-muted: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; transition: background 0.4s ease, color 0.4s ease; }

        .container { position: relative; z-index: 1; text-align: center; max-width: 600px; padding: 2rem; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .error-code { font-size: clamp(6rem, 15vw, 10rem); font-weight: 900; line-height: 1; letter-spacing: -4px; background: linear-gradient(135deg, #ef4444, var(--primary), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.5rem; }
        .error-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; }
        .error-desc { font-size: 1rem; color: var(--text-muted); line-height: 1.7; margin-bottom: 2.5rem; max-width: 460px; margin-left: auto; margin-right: auto; }
        .divider { width: 60px; height: 3px; background: linear-gradient(90deg, #ef4444, var(--primary)); border-radius: 2px; margin: 0 auto 2rem; }
        .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.8rem 2rem; border-radius: 12px; font-size: 0.95rem; font-weight: 600; text-decoration: none; color: #fff; background: linear-gradient(135deg, var(--primary), var(--accent2)); box-shadow: 0 4px 24px rgba(99,102,241,0.3); transition: all 0.4s cubic-bezier(0.4,0,0.2,1); position: relative; overflow: hidden; }
        .btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); transition: left 0.5s; }
        .btn:hover::before { left: 100%; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 40px rgba(99,102,241,0.5); }
        .logo { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 3rem; opacity: 0.7; }
        .logo svg { width: 28px; height: 28px; }
        .logo span { font-weight: 800; font-size: 1rem; background: linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .page-icon { font-size: 3rem; margin-bottom: 1.5rem; }
    
        /* ===== LIGHT THEME ===== */
        body.light-theme { --bg: #f0f4ff; --text: #1e1b4b; --text-muted: #4c5169; --border: rgba(99,102,241,0.2); background: #f0f4ff; color: #1e1b4b; }
        body.light-theme .container { color: #1e1b4b; }
        body.light-theme .error-title { color: #1e1b4b; }
        body.light-theme .error-desc { color: #4c5169; }
        body.light-theme .logo { opacity: 0.85; }
        body.light-theme .logo span { background: linear-gradient(135deg, #1e1b4b, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        body.light-theme .btn { color: #fff; }
        body.light-theme .btn:hover { box-shadow: 0 8px 40px rgba(99,102,241,0.35); }
        /* ===== THEME TOGGLE ===== */
        .theme-toggle { position: fixed; top: 1.2rem; right: 1.2rem; z-index: 100; width: 42px; height: 42px; border-radius: 12px; background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.2); color: var(--text-muted); font-size: 1.15rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
        .theme-toggle:hover { background: rgba(99,102,241,0.18); border-color: var(--primary); color: var(--text); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(99,102,241,0.3); }
        .theme-toggle:active { transform: translateY(0) scale(0.95); }
        .toggle-icon { display: inline-block; transition: transform 0.25s cubic-bezier(0.4,0,0.2,1), opacity 0.2s; line-height: 1; }
        body.light-theme .theme-toggle { background: rgba(99,102,241,0.08); border-color: rgba(99,102,241,0.3); }
        body.light-theme .theme-toggle:hover { background: rgba(99,102,241,0.16); box-shadow: 0 4px 16px rgba(99,102,241,0.2); }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme" title="Toggle dark / light theme">
        <span class="toggle-icon" id="themeIcon">🌙</span>
    </button>


    <div class="container">
        <div class="logo"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#6366f1"/><stop offset="50%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs><polygon points="50,8 92,30 92,70 50,92 8,70 8,30" fill="none" stroke="url(#lg)" stroke-width="3"/><text x="50" y="58" text-anchor="middle" font-family="system-ui" font-weight="900" font-size="28" fill="url(#lg)">E</text></svg><span>Enginx</span></div>
        <div class="page-icon">🚫</div>
        <div class="error-code">403</div>
        <h1 class="error-title">Forbidden</h1>
        <div class="divider"></div>
        <p class="error-desc">You don't have permission to access this resource. The server understood your request but refuses to authorize it.</p>
        <a href="/" class="btn">← Back to Home</a>
    </div>


    <script>
    (function () {
        var themeToggleBtn = document.getElementById("themeToggle");
        var themeIcon = document.getElementById("themeIcon");

        function getCookie(name) {
            var match = document.cookie.match(new RegExp("(?:^|; )" + name + "=([^;]*)"));
            return match ? decodeURIComponent(match[1]) : null;
        }

        function setCookie(name, value, days) {
            var expires = "";
            if (days) {
                var d = new Date();
                d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
                expires = "; expires=" + d.toUTCString();
            }
            document.cookie = name + "=" + encodeURIComponent(value) + expires + "; path=/; SameSite=Lax";
        }

        function applyTheme(theme) {
            if (theme === "light") {
                document.body.classList.add("light-theme");
                if (themeIcon) themeIcon.textContent = "☀️";
            } else {
                document.body.classList.remove("light-theme");
                if (themeIcon) themeIcon.textContent = "🌙";
            }
        }

        function sendThemeCookie(theme) {
            setCookie("theme", theme, 365);
            fetch("/set-theme?theme=" + encodeURIComponent(theme), {
                method: "GET",
                credentials: "same-origin"
            }).catch(function () {});
        }

        var savedTheme = getCookie("theme") || "dark";
        applyTheme(savedTheme);

        if (themeToggleBtn) {
            themeToggleBtn.addEventListener("click", function () {
                var isLight = document.body.classList.contains("light-theme");
                var newTheme = isLight ? "dark" : "light";
                if (themeIcon) {
                    themeIcon.style.transform = "rotate(180deg) scale(0.4)";
                    themeIcon.style.opacity = "0";
                    setTimeout(function () {
                        applyTheme(newTheme);
                        themeIcon.style.transform = "rotate(0deg) scale(1)";
                        themeIcon.style.opacity = "1";
                    }, 200);
                } else {
                    applyTheme(newTheme);
                }
                sendThemeCookie(newTheme);
            });
        }
    })();
    </script>
</body>
</html>
