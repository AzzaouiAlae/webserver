server {
    listen 1025;
    server_name localhost;
    root HTTP/DefaultPages;
    index index.html index.htm;
    autoindex off;
    allow_methods GET POST DELETE;
    client_max_body_size 1m;
    error_page 404 /errors/404.html;

    # Example location with chunked_send enabled (default)
    location /cgi-bin {
        allow_methods GET POST;
        cgi_pass .php /usr/bin/php-cgi;
        chunked_send on;  # Uses chunked transfer encoding when no Content-Length (DEFAULT)
    }

    # Example location with chunked_send disabled
    # Server will buffer CGI response to file and send with Content-Length
    location /cgi-buffered {
        allow_methods GET POST;
        cgi_pass .php /usr/bin/php-cgi;
        chunked_send off;  # Buffers response to file and sends with Content-Length header
    }

    # Static files location (chunked_send is ignored for non-CGI requests)
    location / {
        index index.html index.htm;
        allow_methods GET;
    }
}
