server {
    listen 1025;
	listen 1026;
	server_name localhost;
	root EngineX/www;
	index index.htm;
	autoindex on;
	client_max_body_size 1024b;
	cgi_timeout 3;
	keep_alive_timeout 300;
	client_read_timeout 300;

	
	location / {
		client_body_in_file_only on;
	}

	location / {
        cgi_pass .py python3;
    }
	location /upload{
		client_body_in_file_only on;
		delete_files on;
	}
	location /get-only {
		allow_methods GET;
	}
	location /post-only {
		allow_methods POST;
	}
	location /old-page {
       return 301 /new-page;
    }
	location /temp-page {
		return 302 /index.htm;
	}
	location /ext-redirect {
		return 301 http://example.com;
	}

	location /autoindex-dir {
		autoindex  on;
	}
	
	location /no-index-dir {
		autoindex  off;
	}

	location /auto-with-index {
		autoindex  on;
		index      index.htm;
	}

	location /mapped {
    	root  /tmp/mapped-root;
    	index index.htm;
	}
	location /dir-with-index { 
		root EngineX/www;
		index index.htm;
	}
	location /cgi-bin {
		cgi_pass .py python3;
	}
}


types {
	text/html       html htm shtml;
	text/css        css;
	text/plain      txt;
	image/jpeg      jpeg jpg;
	image/png       png;
	image/gif       gif;
	application/javascript   js;
	application/octet-stream bin exe dll;
}
